<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Column Login with Slideshow</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Two Column Login - Binghatti</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
        <style>
            body {
                margin: 0;
                font-family: 'Poppins', sans-serif;
            }

            .overlay {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 50%;
                background: linear-gradient(to top, rgba(0, 0, 1, 1), transparent);
                z-index: 5;
            }

            .container {
                display: flex;
                height: 100vh;
            }

            /* Left section with static image */
            .left-section {
                flex: 1;
                position: relative;
                background-image: url('img4.jpg');
                /* Your static image */
                background-size: cover;
                background-position: center;
            }

            .binghatti-logo {
                position: absolute;
                top: 20px;
                left: 20px;
                z-index: 10;
                width: 150px;
                height: auto;
            }

            /* Text overlay */
            .image-text {
                position: absolute;
                top: 80%;
                left: 40px;
                transform: translateY(-50%);
                color: white;
                z-index: 10;
                max-width: 450px;
            }

            .image-text h1 {
                font-size: 30px;
                font-weight: 100;
                margin-bottom: 10px;
            }

            .image-text p {
                font-size: 16px;
                font-weight: 100;
                line-height: 1.5;
            }

            /* Right section login */
            .right-section {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 40px;
            }

            .login-box {
                width: 100%;
                max-width: 480px;
            }

            .login-box h1 {
                font-weight: 100;
                margin-bottom: 8px;
                color: #1a1a1a;
            }

            .login-box p {
                color: #777;
                margin-bottom: 20px;
            }

            .input-group {
                margin-bottom: 16px;
            }

            .input-group label {
                font-size: 14px;
                font-weight: 100;
                margin-bottom: 6px;
                display: block;
            }

            .input-group input {
                font-family: 'Poppins';
                height: 20px;
                width: 85%;
                padding: 10px 12px;
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 14px;
                color: black;
                outline: 0 !important;
            }

            .input-group input:focus,
            .input-group input:visited,
            .input-group input:active {
                border-color: #b78c2d;
                /* Darker gold when focused */
                box-shadow: 0 0 4px rgba(27, 26, 26, 0.3);
            }

            .options {
                width: 90%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
                margin-bottom: 16px;
            }

            .options a {
                color: #777;
                text-decoration: none;
            }

            .login-btn {
                font-family: 'Poppins';
                margin-top: 25px;
                width: 91%;
                padding: 12px;
                background: black;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 14px;
                cursor: pointer;
                text-align: center;
                text-decoration: none;
                display: block;
            }
        </style>
    </head>

<body>
    <div class="container">
        <div class="left-section">
            <img src="binghatti-logo.svg" alt="Binghatti Logo" class="binghatti-logo">
            <div class="overlay"></div>
            <div class="image-text">
                <h1>Where Sophistication Meets Skyline</h1>
                <p>Experience the height of elegance and comfort at Binghatti Residences.</p>
            </div>
        </div>

        <div class="right-section">
            <div class="login-box">
                <h1>Welcome Back to Binghatti Employee Management System!</h1>
                <p>Sign in to your account</p>
                <div style="margin-top: 40px;"></div>
                <div class="input-group">
                    <label>Your Email</label>
                    <input type="email" placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password">
                </div>
                <div class="options">
                    <label><input type="checkbox"> Remember Me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <a href="dashboard.html" class="login-btn">Login to Dashboard</a>
            </div>
        </div>
    </div>
</body>

</html>
